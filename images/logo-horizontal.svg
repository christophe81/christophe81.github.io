<svg width="400" height="80" viewBox="0 0 400 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield with code brackets and checkmark -->
  <g transform="translate(20, 10)">
    <!-- Shield outline -->
    <path d="M30 5 L50 10 L55 15 L55 35 L50 45 L30 55 L10 45 L5 35 L5 15 L10 10 Z"
          fill="none"
          stroke="#2dd882"
          stroke-width="2.5"
          stroke-linejoin="round"/>

    <!-- Code brackets -->
    <path d="M20 20 L15 30 L20 40"
          stroke="#2dd882"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.4"/>
    <path d="M40 20 L45 30 L40 40"
          stroke="#2dd882"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.4"/>

    <!-- Checkmark (dominant) -->
    <path d="M22 30 L28 36 L42 22"
          stroke="#2dd882"
          stroke-width="3.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>

  <!-- Text: THE ASSERTION -->
  <g transform="translate(100, 0)">
    <!-- THE (smaller, above) -->
    <text x="0" y="28"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="14"
          font-weight="500"
          letter-spacing="2"
          fill="#1a1f2e">THE</text>

    <!-- ASSERTION (larger, below) -->
    <text x="0" y="54"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="28"
          font-weight="700"
          letter-spacing="1"
          fill="#1a1f2e">ASSERTION</text>
  </g>
</svg>
